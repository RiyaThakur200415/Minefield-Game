<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>The Minefield: Demo</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="main-interface" class="war-room">

<header class="hud">

<div class="status-indicators">
SYSTEM: ACTIVE
<span id="chance-counter">ATTEMPTS REMAINING: 5</span>
</div>

<h1>CYBER DECEPTION MINEFIELD</h1>

<p>
Find the real <b>Production Server</b>.  
Most files are fake honeypots designed to detect attackers.
</p>

</header>


<main class="grid-layout">

<section id="node-grid"></section>

<aside class="watcher-feed">

<h3>SECURITY MONITOR</h3>

<div id="log-content">
> Monitoring for suspicious activity...
</div>

</aside>

</main>

</div>


<div id="alarm-overlay" class="hidden">

<div class="alarm-card">

<h1 class="glitch">ALERT</h1>

<div class="alert-bar">SECURITY EVENT</div>

<p id="alarm-msg"></p>

<h2 class="denied">ACCESS BLOCKED</h2>

<div class="btn-group">

<button onclick="location.reload()">RESTART</button>

<button id="reveal-btn" class="hidden" onclick="auditReveal()">
REVEAL REAL SERVER
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
